<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c896"/>
      <stop offset="100%" style="stop-color:#00a8d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- Terminal window bar -->
  <rect x="28" y="52" width="200" height="152" rx="10" fill="#0a1520" opacity="0.8"/>
  <rect x="28" y="52" width="200" height="26" rx="10" fill="#162030"/>
  <rect x="28" y="66" width="200" height="12" fill="#162030"/>

  <!-- Window dots -->
  <circle cx="50" cy="65" r="5" fill="#ff5f57"/>
  <circle cx="66" cy="65" r="5" fill="#febc2e"/>
  <circle cx="82" cy="65" r="5" fill="#28c840"/>

  <!-- Prompt line 1: $ parqet -->
  <text x="44" y="108" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="url(#accent)">$</text>
  <text x="58" y="108" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#e2e8f0"> parqet</text>

  <!-- Output line -->
  <text x="44" y="132" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#4ade80">✓</text>
  <text x="60" y="132" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#64748b"> Holdings</text>
  <text x="60" y="150" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#64748b"> Performance</text>
  <text x="60" y="168" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#64748b"> Activities</text>

  <!-- Cursor blink -->
  <rect x="44" y="178" width="9" height="14" rx="1" fill="url(#accent)" opacity="0.9"/>

  <!-- Bottom label -->
  <text x="128" y="228" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="2">parqet-cli</text>
</svg>
